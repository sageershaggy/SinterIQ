<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent polyfills from overwriting fetch and throwing "Cannot set property fetch of #<Window> which has only a getter"
      if (typeof window !== 'undefined' && window.fetch) {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { /* ignore attempts to overwrite fetch */ },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not protect window.fetch:', e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
